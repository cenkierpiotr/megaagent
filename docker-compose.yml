services:
  # Main orchestrator using CrewAI
  core:
    build: ./core
    container_name: claw_core
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./core:/app
      - ./shared:/shared
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://user:pass@postgres:5432/clawdb
      - LLM_MODEL=llama3
      - LLM_MODEL_LIGHT=llama3:3b
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - redis
      - postgres
    networks:
      - claw_network

  multimodal:
    build: ./multimodal
    container_name: claw_multimodal
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    #     limits:
    #       cpus: '4.0'
    #       memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./multimodal:/app
    networks:
      - claw_network

  # Infrastructure
  redis:
    image: redis:7-alpine
    container_name: claw_redis
    networks:
      - claw_network

  postgres:
    image: postgres:15-alpine
    container_name: claw_postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=clawdb
    networks:
      - claw_network

networks:
  claw_network:
    driver: bridge
