services:
  claw-postgres:
    image: postgres:15-alpine
    container_name: claw_postgres
    restart: always
    environment:
      POSTGRES_USER: claw
      POSTGRES_PASSWORD: claw_password
      POSTGRES_DB: claw_db
    volumes:
      - ./shared/postgres_data:/var/lib/postgresql/data
    networks:
      - claw-net

  claw-redis:
    image: redis:7-alpine
    container_name: claw_redis
    restart: always
    networks:
      - claw-net

  claw-core:
    build:
      context: ./core
    container_name: claw_core
    depends_on:
      - claw-redis
    environment:
      - REDIS_URL=redis://claw-redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./core:/app
      - ./shared:/app/shared
    # Hardware access for telemetry (privileged for psutil/pynvml)
    privileged: true
    pid: "host"
    networks:
      - claw-net

  claw-web:
    build:
      context: ./web
    container_name: claw_web
    restart: always
    depends_on:
      - claw-core
      - claw-redis
    environment:
      - REDIS_URL=redis://claw-redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "3000:3000"
    networks:
      - claw-net

  claw-gateway:
    build:
      context: ./gateway
    container_name: claw_gateway
    depends_on:
      - claw-redis
    environment:
      - REDIS_URL=redis://claw-redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - claw-net

networks:
  claw-net:
    driver: bridge
